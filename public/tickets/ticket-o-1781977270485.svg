      <text x="35" y="289" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#64748b">AMOUNT PAID</text>
      <text x="265" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="black" fill="#714B67" text-anchor="end">₹184.80</text>
      
