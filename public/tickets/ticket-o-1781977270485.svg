      <text x="275" y="138" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="end">20/6/2026</text>
      
      <!-- Divider -->
      <line x1="20" y1="155" x2="280" y2="155" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4"/>
      
